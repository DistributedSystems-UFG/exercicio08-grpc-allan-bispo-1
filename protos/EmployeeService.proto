syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.grpc.examples.iotservice";
option java_outer_classname = "IoTServiceProto";
option objc_class_prefix = "TEMP";

package employee_service;

service EmployeeService {
  // Create an employee record
  rpc CreateEmployee (EmployeeData) returns (StatusReply) {}
  // Get an employee´s data
  rpc GetEmployeeDataFromID (EmployeeID) returns (EmployeeData) {}
  // Update an employee´s title/position
  rpc UpdateEmployeeTitle (EmployeeTitleUpdate) returns (StatusReply) {}
  // Delete an employee
  rpc DeleteEmployee (EmployeeID) returns (StatusReply) {}
  // List all employees
  rpc ListAllEmployees (EmptyMessage) returns (EmployeeDataList) {}

  // Update an employee's name and title at once
  rpc UpdateEmployee (EmployeeFullUpdate) returns (StatusReply) {}
  // Search employees by partial name match
  rpc SearchEmployeesByName (SearchQuery) returns (EmployeeDataList) {}
  // Stream all employees one by one (server-side streaming)
  rpc StreamAllEmployees (EmptyMessage) returns (stream EmployeeData) {}
  // Create multiple employees in a single call (client-side streaming)
  rpc BatchCreateEmployees (stream EmployeeData) returns (StatusReply) {}

}

message EmployeeData {
  uint32 id = 1;
  string name = 2;
  string title = 3;
}

message StatusReply {
  string status = 1;
}

message EmployeeID {
  uint32 id = 1;
}

message EmployeeTitleUpdate {
  uint32 id = 1;
  string title = 2;
}

message EmptyMessage{}

message EmployeeDataList{
  repeated EmployeeData employee_data = 1;
}

message EmployeeFullUpdate {
  uint32 id = 1;
  string name = 2;
  string title = 3;
}

message SearchQuery {
  string name = 1;
}
